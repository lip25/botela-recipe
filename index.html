<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>BOTELA RECIPE</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial;
    background:#0f172a;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    max-width:500px;
    margin:auto;
}

h1{
    color:#22c55e;
    margin-bottom:10px;
    font-size:32px;
}

.subtitle{
    color:#94a3b8;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:16px;
    border:none;
    border-radius:14px;
    background:#1e293b;
    color:white;
    font-size:18px;
    text-align:center;
    margin-bottom:20px;
}

input:focus{
    outline:none;
    border:2px solid #22c55e;
}

button{
    width:100%;
    padding:16px;
    margin-bottom:12px;
    border:none;
    border-radius:14px;
    background:#22c55e;
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:scale(1.02);
}

.result{
    margin-top:20px;
    background:#1e293b;
    padding:25px;
    border-radius:18px;
    text-align:left;
    line-height:1.9;
    font-size:17px;
}

.result h2{
    color:#22c55e;
    margin-bottom:15px;
    text-align:center;
}

.highlight{
    color:#22c55e;
    font-weight:bold;
}

.footer{
    margin-top:20px;
    color:#94a3b8;
    font-size:14px;
    text-align:center;
}

.option-btn{
    background:#334155;
}

</style>
</head>

<body>

<div class="container">

<h1>BOTELA RECIPE</h1>

<div class="subtitle">
250ml • Moka Pot Recipe
</div>

<input type="number" id="botol" placeholder="Masukkan jumlah botol">

<button onclick="hitung('americano')">
☕ Americano
</button>

<button onclick="hitung('matcha')">
🍵 Matcha
</button>

<button onclick="hitung('kopisusu')">
🥛 Kopi Susu Gula Aren
</button>

<button class="option-btn" onclick="hitung('kopisusu_less')">
🥛 Kopi Susu Aren Less Sugar
</button>

<div class="result" id="hasil">
Masukkan jumlah botol lalu pilih menu
</div>

<div class="footer">
BOTELA • Signature Recipe
</div>

</div>

<script>

function hitung(menu){

    let botol = Number(document.getElementById("botol").value);

    if(botol <= 0){

        document.getElementById("hasil").innerHTML = `
        <h2>⚠️ Error</h2>
        Masukkan jumlah botol terlebih dahulu
        `;

        return;
    }

    let hasil = "";

    // =========================
    // AMERICANO
    // =========================
    if(menu === "americano"){

        let ekstrak = botol * 60;
        let air = botol * 190;

        hasil = `
        <h2>☕ Americano</h2>

        Jumlah botol:
        <span class="highlight">${botol}</span>
        <br><br>

        Ekstrak kopi moka pot:
        <span class="highlight">${ekstrak} ml</span><br>

        Air dingin:
        <span class="highlight">${air} ml</span><br><br>

        ✨ Clean • Bold • No Sugar
        `;
    }

    // =========================
    // MATCHA
    // =========================
    if(menu === "matcha"){

        let matcha = botol * 25;
        let susu = botol * 150;
        let skm = botol * 4;
        let air = botol * 80;

        hasil = `
        <h2>🍵 Matcha</h2>

        Jumlah botol:
        <span class="highlight">${botol}</span>
        <br><br>

        Matcha:
        <span class="highlight">${matcha} gram</span><br>

        Susu UHT:
        <span class="highlight">${susu} ml</span><br>

        SKM:
        <span class="highlight">${skm} ml</span><br>

        Air panas:
        <span class="highlight">${air} ml</span><br><br>

        ✨ Creamy • Sweet • Matcha Balance
        `;
    }

    // =========================
    // KOPI SUSU GULA AREN NORMAL
    // =========================
    if(menu === "kopisusu"){

        let ekstrak = botol * 60;
        let susu = botol * 155;
        let skm = botol * 5;
        let creamer = botol * 3;
        let gula = botol * 27;

        hasil = `
        <h2>🥛 Kopi Susu Gula Aren</h2>

        Jumlah botol:
        <span class="highlight">${botol}</span>
        <br><br>

        Ekstrak kopi moka pot:
        <span class="highlight">${ekstrak} ml</span><br>

        Susu UHT:
        <span class="highlight">${susu} ml</span><br>

        SKM:
        <span class="highlight">${skm} ml</span><br>

        Creamer:
        <span class="highlight">${creamer} gram</span><br>

        Gula aren:
        <span class="highlight">${gula} gram</span><br><br>

        ✨ Creamy • Bold • Signature Botela
        `;
    }

    // =========================
    // LESS SUGAR
    // =========================
    if(menu === "kopisusu_less"){

        let ekstrak = botol * 45;
        let susu = botol * 175;
        let skm = botol * 3;
        let creamer = botol * 3;
        let gula = botol * 18;

        hasil = `
        <h2>🥛 Kopi Susu Aren Less Sugar</h2>

        Jumlah botol:
        <span class="highlight">${botol}</span>
        <br><br>

        Ekstrak kopi moka pot:
        <span class="highlight">${ekstrak} ml</span><br>

        Susu UHT:
        <span class="highlight">${susu} ml</span><br>

        SKM:
        <span class="highlight">${skm} ml</span><br>

        Creamer:
        <span class="highlight">${creamer} gram</span><br>

        Gula aren:
        <span class="highlight">${gula} gram</span><br><br>

        ✨ Less Sweet • More Coffee Taste
        `;
    }

    document.getElementById("hasil").innerHTML = hasil;
}

</script>

</body>
</html>
