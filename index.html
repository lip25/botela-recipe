<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>BOTELA RECIPE</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:500px;
margin:auto;
}

h1{
color:#22c55e;
margin-bottom:10px;
font-size:32px;
}

.subtitle{
color:#94a3b8;
margin-bottom:25px;
}

input{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:#1e293b;
color:white;
font-size:18px;
text-align:center;
margin-bottom:20px;
}

button{
width:100%;
padding:16px;
margin-bottom:12px;
border:none;
border-radius:14px;
background:#22c55e;
color:white;
font-size:18px;
font-weight:bold;
}

.option-btn{
background:#334155;
}

.result{
margin-top:20px;
background:#1e293b;
padding:25px;
border-radius:18px;
text-align:left;
line-height:1.9;
font-size:17px;
}

.result h2{
color:#22c55e;
text-align:center;
}

.highlight{
color:#22c55e;
font-weight:bold;
}

.footer{
margin-top:20px;
color:#94a3b8;
}

</style>

</head>


<body>


<div class="container">


<h1>BOTELA RECIPE</h1>

<div class="subtitle">
250ml • Hemat HPP System
</div>


<input type="number" id="botol" placeholder="Jumlah botol">


<button onclick="hitung('americano')">
☕ Americano
</button>


<button onclick="hitung('matcha')">
🍵 Matcha
</button>


<button onclick="hitung('kopisusu')">
🥛 Kopi Susu Gula Aren
</button>



<div class="result" id="hasil">

Masukkan jumlah botol lalu pilih menu

</div>


<div class="footer">

BOTELA • Production System

</div>


</div>



<script>


function hitung(menu){


let botol =
Number(document.getElementById("botol").value);


if(!botol || botol<=0){

document.getElementById("hasil").innerHTML=

`
<h2>⚠️ Error</h2>

Masukkan jumlah botol

`;

return;

}



let hasil="";



/* AMERICANO */

if(menu==="americano"){


let kopi = botol * 4 ;

let air = botol * 250;


let hpp =
(botol*2500);



hasil=

`

<h2>☕ Americano</h2>


Jumlah botol:

<span class="highlight">
${botol}
</span>

<br><br>


Nescafe:

<span class="highlight">
${kopi} gram
</span>


<br>


Air dingin:

<span class="highlight">
${air} ml
</span>


<br><br>


HPP:

<span class="highlight">
Rp ${hpp.toLocaleString()}
</span>


<br>


HPP / botol:

<span class="highlight">
Rp 2.500
</span>


<br><br>

✨ Clean • Strong • Low Cost


`;

}





/* MATCHA */

if(menu==="matcha"){


let matcha = botol * 20;

let susu = botol * 150;

let skm = botol * 3;

let air = botol * 75;



let hpp =
(botol*5700);



hasil=

`

<h2>🍵 Matcha</h2>


Jumlah botol:

<span class="highlight">
${botol}
</span>


<br><br>


Matcha Mix:

<span class="highlight">
${matcha} gram
</span>


<br>


Susu UHT:

<span class="highlight">
${susu} ml
</span>


<br>


SKM:

<span class="highlight">
${skm} gram
</span>


<br>


Air panas:

<span class="highlight">
${air} ml
</span>


<br><br>


HPP:

<span class="highlight">
Rp ${hpp.toLocaleString()}
</span>


<br>


HPP / botol:

<span class="highlight">
Rp 5.700
</span>


<br><br>


✨ Creamy Matcha


`;

}




/* KOPI SUSU */

if(menu==="kopisusu"){



let kopi = botol * 40;

let susu = botol * 130;

let creamer = botol * 10;

let gula = botol * 25;

let air = botol * 20;



let hpp =

(botol*7860);



hasil=

`

<h2>🥛 Kopi Susu Gula Aren</h2>


Jumlah botol:

<span class="highlight">
${botol}
</span>


<br><br>


Ekstrak kopi:

<span class="highlight">
${kopi} ml
</span>


<br>


Susu UHT:

<span class="highlight">
${susu} ml
</span>


<br>


Creamer:

<span class="highlight">
${creamer} gram
</span>


<br>


Gula aren:

<span class="highlight">
${gula} ml
</span>


<br>


Air:

<span class="highlight">
${air} ml
</span>


<br><br>


HPP:

<span class="highlight">
Rp ${hpp.toLocaleString()}
</span>


<br>


HPP / botol:

<span class="highlight">
Rp 7.860
</span>


<br><br>


✨ Coffee Milk Signature


`;

}



document.getElementById("hasil").innerHTML=hasil;



}


</script>


</body>
</html>
